name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: aniflow
          POSTGRES_PASSWORD: aniflow
          POSTGRES_DB: aniflow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://aniflow:aniflow@localhost:5432/aniflow_test
      SECRET_KEY: ci-test-secret-key-not-for-production
      DEBUG: "0"
      ALLOWED_HOSTS: localhost,127.0.0.1
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      ANILIST_CLIENT_ID: test-client-id
      ANILIST_CLIENT_SECRET: test-client-secret
      ANILIST_REDIRECT_URI: http://localhost:8000/auth/anilist/callback/

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python manage.py test --verbosity=2
