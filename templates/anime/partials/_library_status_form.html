{% comment %}
HTMX form: POST status for one library row. Expects: anime_id, current_status.
Requires authenticated RequestContext (csrf, hx).
{% endcomment %}
<form
  method="post"
  action="{% url 'anime_status' anime_id %}"
  hx-post="{% url 'anime_status' anime_id %}"
  hx-swap="none"
  class="inline-flex items-center gap-2"
>
  {% csrf_token %}
  <label class="sr-only" for="library-status-{{ anime_id }}">List status</label>
  <select
    name="status"
    id="library-status-{{ anime_id }}"
    class="bg-white/5 border border-white/10 rounded-xl text-[10px] font-bold uppercase tracking-wider px-2 py-1.5 text-white max-w-[11rem] cursor-pointer focus:outline-none focus:border-accent/40 hover:border-white/20 transition-colors"
    onchange="this.form.requestSubmit()"
  >
    {% for value, label in status_choices %}
      <option value="{{ value }}" {% if value == current_status %}selected{% endif %}>{{ label }}</option>
    {% endfor %}
  </select>
</form>
