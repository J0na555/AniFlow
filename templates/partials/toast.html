<div
 id="toast-{{ id }}"
 class="bg-neo-white border-4 border-black p-4 flex items-center gap-4 min-w-[280px] max-w-md animate-slide-up neo-shadow-md border-l-8 {% if type == 'error' %}border-l-neo-accent{% else %}border-l-neo-secondary{% endif %}"
 hx-on:load="setTimeout(() => document.getElementById('toast-{{ id }}').remove(), 5000)"
>
 <div class="neo-icon-box w-10 h-10 p-0 flex-shrink-0 {% if type == 'error' %}bg-neo-accent{% else %}bg-neo-secondary{% endif %}">
 {% if type == 'error' %}
 <i data-lucide="alert-circle" class="w-5 h-5"></i>
 {% else %}
 <i data-lucide="check-circle" class="w-5 h-5"></i>
 {% endif %}
 </div>
 <p class="text-sm font-black flex-1 text-neo-ink">{{ message }}</p>
 <button
 type="button"
 onclick="this.parentElement.remove()"
 class="neo-btn-ghost w-10 h-10 p-0 flex-shrink-0"
 aria-label="Dismiss"
 >
 <i data-lucide="x" class="w-4 h-4"></i>
 </button>
 <script>lucide.createIcons();</script>
</div>
